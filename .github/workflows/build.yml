name: Build Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller requests rich
      - run: pyinstaller --onefile game.py
      - name: Upload Linux binary
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/game

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller requests rich
      - run: pyinstaller --onefile game.py
      - name: Upload Windows binary
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/game.exe